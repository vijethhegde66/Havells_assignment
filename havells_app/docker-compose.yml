version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - TECHDEMO_TENANT_ID=${TECHDEMO_TENANT_ID}
      - TECHDEMO_CLIENT_ID=${TECHDEMO_CLIENT_ID}
      - TECHDEMO_CLIENT_SECRET=${TECHDEMO_CLIENT_SECRET}
    volumes:
      - ./:/app
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - API_BASE_URL=http://backend:8000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
